server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # .mjs 文件 MIME 类型（放在最前面，优先匹配）
    location ~* \.mjs$ {
        default_type application/javascript;
        try_files $uri =404;
    }

    # 启用 gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml text/xml text/javascript image/svg+xml;
    gzip_min_length 1024;
    gzip_comp_level 6;

    # 静态资源缓存
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API 反向代理 — 将 /api 请求转发到后端
    location /api/ {
        proxy_pass http://backend:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 长请求支持（论文分析可能耗时较长）
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 10s;

        # 关闭缓冲，支持流式响应
        proxy_buffering off;
    }

    # Vue Router HTML5 History 模式 — 所有路径回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
